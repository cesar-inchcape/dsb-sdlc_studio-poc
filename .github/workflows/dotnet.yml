name: .NET Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: windows-latest
    name: Build and Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore "DSB - DXP+/Login.Api/Login.Api.csproj"
      working-directory: .

    - name: Build solution
      run: dotnet build "DSB - DXP+/Login.Api/Login.Api.csproj" --no-restore --configuration Release
      working-directory: .

    - name: Run unit and integration tests
      run: dotnet test "DSB - DXP+/Login.Api.Tests/Login.Api.Tests.csproj" --no-build --verbosity normal --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"
      working-directory: .

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: '**/test-results.trx'

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: code-coverage
        path: '**/coverage.cobertura.xml'

    - name: Check build warnings
      run: dotnet build "DSB - DXP+/Login.Api/Login.Api.csproj" --no-restore /p:TreatWarningsAsErrors=true
      working-directory: .

    - name: Check for code formatting
      run: dotnet format "DSB - DXP+/Login.Api.sln" --verify-no-changes --verbosity diagnostic
      working-directory: .
      continue-on-error: true

    - name: Generate test report
      if: always()
      uses: dorny/test-reporter@v1
      with:
        name: Test Results
        path: '**/test-results.trx'
        reporter: 'dotnet-trx'
        fail-on-error: true
