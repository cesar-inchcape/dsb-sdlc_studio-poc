# Dependabot configuration for automated dependency updates
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/about-dependabot-version-updates

version: 2
updates:
  # NuGet packages for Login.Api
  - package-ecosystem: "nuget"
    directory: "/DSB - DXP+/Login.Api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "America/Santiago"
    
    # Pull request configuration
    pull-request-branch-name:
      separator: "/"
    
    # Reviewers for automated PRs
    reviewers:
      - "cesar-inchcape"
    
    # Allow specific dependency types
    allow:
      - dependency-type: "production"
      - dependency-type: "development"
    
    # Group dependencies by type
    groups:
      development-dependencies:
        dependency-type: "development"
      production-dependencies:
        dependency-type: "production"
    
    # Ignore specific packages
    ignore:
      # Add any packages to ignore here
      # - dependency-name: "NLog"
      #   versions: ["5.x"]
    
    # Commit message configuration
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
      include: "scope"
    
    # Enable automatic merging for specific conditions
    # (Optional - requires branch protection rules)
    auto-merge: false
  
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "America/Santiago"
    
    reviewers:
      - "cesar-inchcape"
    
    commit-message:
      prefix: "ci(actions):"
      include: "scope"
